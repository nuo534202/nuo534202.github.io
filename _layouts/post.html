<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/bubbles.js"></script>
    
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                tags: 'ams'
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                ready: () => {
                    console.log('MathJax 3 loaded and initialized');
                    MathJax.startup.defaultReady();
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll('.post-content img');
            images.forEach(img => {
                img.loading = 'lazy';
                
                img.classList.add('fade-in-image');
                img.onload = () => img.classList.add('loaded');

                img.onerror = function() {
                    console.warn('Image failed to load:', img.src);
                    
                    if (this.dataset.triedFallback === 'true') {
                        this.alt = 'Image not found: ' + (this.src.split('/').pop());
                        this.style.display = 'none';
                        const errorMsg = document.createElement('span');
                        errorMsg.style.color = 'red';
                        errorMsg.style.fontSize = '0.8em';
                        errorMsg.innerText = '[Image Load Failed]';
                        this.parentNode.insertBefore(errorMsg, this.nextSibling);
                        return;
                    }
                    this.dataset.triedFallback = 'true';
                    const filename = this.src.split('/').pop();
                    if (filename) {
                        const newSrc = '/assets/' + filename;
                        console.log('Attempting fallback to:', newSrc);
                        this.src = newSrc;
                    }
                };
            });

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').then(registration => {
                        console.log('SW registered: ', registration);
                    }).catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
                });
            }

            // Performance Monitoring
            if ('PerformanceObserver' in window) {
                try {
                    new PerformanceObserver((entryList) => {
                        for (const entry of entryList.getEntries()) {
                            console.log('LCP:', entry.startTime, entry);
                        }
                    }).observe({type: 'largest-contentful-paint', buffered: true});

                    new PerformanceObserver((entryList) => {
                        for (const entry of entryList.getEntries()) {
                            if (!entry.hadRecentInput) {
                                console.log('CLS Shift:', entry.value, entry);
                            }
                        }
                    }).observe({type: 'layout-shift', buffered: true});
                } catch (e) {
                    console.warn('PerformanceObserver not supported.');
                }
            }
        });
    </script>
    <style>
        .fade-in-image {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .fade-in-image.loaded {
            opacity: 1;
        }
    </style>
    <link rel="icon" href="nuo534202.jpg" type="image/jpeg">
</head>
<body>
    
    <div class="container blog-container post-page-container">
        <h1>{{ page.title }}</h1>
        <div class="decorative-line"></div>
        
        <div class="post-content">
            {{ content }}
        </div>
    </div>

    <footer class="site-footer">
        <div class="section-container">
            <div class="footer-content">
                <p class="footer-desc">Made with <code class="inline-code">❤️</code> and <code class="inline-code">Poetry</code></p>
                <p class="footer-copy">nuo534202 &copy; <span id="year"></span> All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // Add copy button to each code block
        document.querySelectorAll('.post-content .highlight').forEach(function(block) {
            var btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.textContent = 'Copy';
            btn.setAttribute('aria-label', 'Copy code');
            block.appendChild(btn);

            btn.addEventListener('click', function() {
                var code = block.querySelector('code');
                if (!code) return;
                copyText(code.textContent, btn);
            });
        });

        // Also handle plain <pre> blocks not inside .highlight
        document.querySelectorAll('.post-content pre:not(.highlight pre)').forEach(function(pre) {
            if (pre.parentElement.classList.contains('highlight')) return;
            var btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.textContent = 'Copy';
            btn.setAttribute('aria-label', 'Copy code');
            pre.appendChild(btn);

            btn.addEventListener('click', function() {
                var code = pre.querySelector('code');
                var text = code ? code.textContent : pre.textContent;
                copyText(text, btn);
            });
        });

        function copyText(text, btn) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showCopied(btn);
                });
            } else {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopied(btn);
            }
        }

        function showCopied(btn) {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
            }, 2000);
        }
    </script>
</body>
</html>
