    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');
        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        function filterByTag(tag) {
            const cards = document.querySelectorAll('.post-card');
            cards.forEach(card => {
                const tags = card.getAttribute('data-tags');
                if (tag === 'all' || (tags && tags.includes(tag))) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
            document.querySelectorAll('#tag-filter .tag').forEach(t => t.classList.remove('tag-active'));
            document.querySelector(`#tag-filter .tag[data-tag="${tag}"]`).classList.add('tag-active');
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animate-in');
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.post-card').forEach(el => {
            observer.observe(el);
        });
    </script>
