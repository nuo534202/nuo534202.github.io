title: Nuo's Blog        # 站点标题（会显示在页面头部）
# email: your-email@example.com  # 可选，你的邮箱
# description: 用 Jekyll 搭建的极简博客  # 站点描述
baseurl: ""                    # 固定为空（仓库名是 xxx.github.io 时）
url: "https://nuo534202.github.io"  # 你的 Pages 访问地址

# theme: minima  # 已移除：站点使用完全自定义CSS，不需要Jekyll主题

markdown: kramdown
highlighter: rouge
permalink: /:title.html
future: true

# Kramdown 配置 - 支持数学公式
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  
  math_engine: mathjax
  math_engine_opts:
    preview: true
    
include:
  - _posts/img

# 默认Front Matter
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "nuo534202"